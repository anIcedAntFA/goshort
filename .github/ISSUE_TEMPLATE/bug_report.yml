name: Bug Report
description: Report a bug in GoShort
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below.

  - type: input
    id: version
    attributes:
      label: GoShort Version
      description: "Run `goshort version` or check the GitHub release"
      placeholder: "v0.3.0"
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Server (goshort)
        - CLI (goshort-cli)
        - Docker
        - Documentation
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug.
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      description: Paste any error messages or logs.
      render: shell

  - type: input
    id: os
    attributes:
      label: OS and architecture
      placeholder: "macOS arm64 / Ubuntu 22.04 amd64 / Windows 11"
