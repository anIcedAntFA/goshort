name: Feature Request
description: Suggest a new feature for GoShort
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Check the
        [roadmap](https://github.com/anIcedAntFA/goshort/blob/main/docs/ROADMAP.md)
        first — it might already be planned.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or pain point.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should this work? Be specific.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you have thought about.

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Server (goshort)
        - CLI (goshort-cli)
        - API
        - Docker / Deployment
        - MCP Integration
        - Documentation
        - Other
