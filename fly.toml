# fly.toml app configuration file generated for goshort-api on 2026-05-03T16:19:48+07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'goshort-api'
primary_region = 'sin'

[build]
  dockerfile = 'Dockerfile'

[env]
  GOSHORT_CACHE_DRIVER = 'memory'
  GOSHORT_LOGGING_FORMAT = 'json'
  GOSHORT_LOGGING_LEVEL = 'info'
  GOSHORT_SERVER_BASE_URL = 'https://goshort.app'
  GOSHORT_SERVER_PORT = '8080'
  GOSHORT_STORAGE_SQLITE_PATH = '/app/data/goshort.db'

[[mounts]]
  source = 'goshort_data'
  destination = '/app/data'
  initial_size = '1'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[checks]
  [checks.health]
    port = 8080
    type = 'http'
    interval = '30s'
    timeout = '5s'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
  cpus = 1
  memory_mb = 256
