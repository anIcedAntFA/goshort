# Development services — run with: docker compose -f docker-compose.dev.yml up -d
services:
  redis:
    image: redis:7-alpine
    container_name: goshort-redis-dev
    ports:
      - "6379:6379"
    command: redis-server --appendonly no --save ""
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
