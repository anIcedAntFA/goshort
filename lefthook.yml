pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.go"
      run: golangci-lint run --fix
      stage_fixed: true
    test-changed:
      glob: "*.go"
      run: |
        changed_pkgs=$(git diff --cached --name-only | grep '\.go$' \
          | xargs -I{} dirname {} | sort -u \
          | sed 's|^|./|')
        if [ -n "$changed_pkgs" ]; then
          go test -race -count=1 -timeout=30s $changed_pkgs
        fi
    secrets:
      run: gitleaks git --no-banner --staged

pre-push:
  commands:
    full-test:
      run: go test -race -count=1 -timeout=60s ./...
    vet:
      run: go vet ./...

commit-msg:
  commands:
    conventional:
      run: |
        msg=$(cat {1})
        types="(рџЋ‰ init|вњЁ feat|рџђ› fix|рџљ‘пёЏ hotfix|рџ“ќ docs|рџ’„ style|в™»пёЏ refactor|вљЎпёЏ perf|вњ… test|в¬†пёЏ update-deps|рџ”§ configs|рџ”Ё chore|рџ’Ґ breaking|рџљЂ deploy)"
        if ! echo "$msg" | grep -qP "^${types}(\([^)]+\))?!?: .+"; then
          echo "вќЊ Commit message must follow: emoji type(scope): subject"
          echo ""
          echo "   Valid types:"
          echo "   рџЋ‰ init    вњЁ feat    рџђ› fix      рџљ‘пёЏ hotfix"
          echo "   рџ“ќ docs    рџ’„ style   в™»пёЏ  refactor  вљЎпёЏ perf"
          echo "   вњ… test    в¬†пёЏ  update-deps   рџ”§ configs  рџ”Ё chore"
          echo "   рџ’Ґ breaking  рџљЂ deploy"
          echo ""
          echo "   Examples:"
          echo "   вњЁ feat(api): add URL shortening endpoint"
          echo "   рџђ› fix(cache): align TTL to expiry time"
          echo "   рџ”§ configs: add golangci-lint configuration"
          echo ""
          echo "   Got: $msg"
          exit 1
        fi
