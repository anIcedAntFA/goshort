openapi: 3.1.0
info:
  title: GoShort API
  version: 0.2.0
  description: |
    Self-hosted URL shortener API.

    **Auth:** All write endpoints require `X-API-Key` header (Phase 3).
    Public endpoints: `GET /{code}`, `GET /health`, `GET /metrics`, `GET /docs`.

servers:
  - url: http://localhost:8080
    description: Local development

security: []

paths:
  /api/v1/urls:
    post:
      summary: Create short URL
      operationId: createURL
      tags: [URLs]
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateURLRequest"
            example:
              url: "https://example.com/very/long/path?with=params"
              custom_alias: "my-link"
              expires_in: "30d"
      responses:
        "201":
          description: Short URL created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateURLResponse"
              example:
                short_code: "my-link"
                short_url: "http://localhost:8080/my-link"
                original_url: "https://example.com/very/long/path?with=params"
                expires_at: "2025-07-01T00:00:00Z"
                created_at: "2025-06-01T12:00:00Z"
        "400":
          description: Invalid URL or expires_in format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalid_url:
                  value:
                    error:
                      code: invalid_url
                      message: The URL format is invalid
                invalid_expires:
                  value:
                    error:
                      code: invalid_expires
                      message: The expires_in duration is invalid
        "409":
          description: Alias already in use
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: alias_taken
                  message: The requested alias is already in use
        "422":
          description: Alias validation failed or reserved path
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalid_alias:
                  value:
                    error:
                      code: invalid_alias
                      message: The alias format is invalid
                reserved_path:
                  value:
                    error:
                      code: reserved_path
                      message: The alias is a reserved path
        "429":
          description: Too many requests
          headers:
            Retry-After:
              description: Seconds to wait before retrying
              schema:
                type: string
              example: "60"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: rate_limited
                  message: Too many requests. Please try again later.

    get:
      summary: List URLs (paginated)
      operationId: listURLs
      tags: [URLs]
      security:
        - ApiKeyAuth: []
      parameters:
        - name: page
          in: query
          description: Page number (1-based)
          schema:
            type: integer
            default: 1
            minimum: 1
          example: 1
        - name: per_page
          in: query
          description: Items per page
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
          example: 20
      responses:
        "200":
          description: Paginated URL list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListURLsResponse"
              example:
                data:
                  - short_code: k7Xm2p
                    short_url: "http://localhost:8080/k7Xm2p"
                    original_url: "https://example.com"
                    is_custom: false
                    expires_at: null
                    created_at: "2025-06-01T12:00:00Z"
                    click_count: 42
                pagination:
                  page: 1
                  per_page: 20
                  total: 156
                  total_pages: 8
        "429":
          description: Too many requests
          headers:
            Retry-After:
              description: Seconds to wait before retrying
              schema:
                type: string
              example: "60"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: rate_limited
                  message: Too many requests. Please try again later.

  /api/v1/urls/batch:
    post:
      summary: Batch create short URLs
      operationId: batchCreateURLs
      tags: [URLs]
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchCreateURLRequest"
            example:
              urls:
                - url: "https://a.com"
                  custom_alias: "a-link"
                  expires_in: "7d"
                - url: "https://b.com"
                - url: "not-a-url"
      responses:
        "200":
          description: Batch results (partial success is possible)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchCreateURLResponse"
              example:
                results:
                  - short_code: "a-link"
                    short_url: "http://localhost:8080/a-link"
                    original_url: "https://a.com"
                    expires_at: "2025-07-01T00:00:00Z"
                    created_at: "2025-06-01T12:00:00Z"
                  - short_code: "k7Xm2p"
                    short_url: "http://localhost:8080/k7Xm2p"
                    original_url: "https://b.com"
                    expires_at: null
                    created_at: "2025-06-01T12:00:01Z"
                  - error:
                      code: invalid_url
                      message: The URL format is invalid
                summary:
                  total: 3
                  success: 2
                  failed: 1
        "400":
          description: Batch is empty or exceeds the 50-item limit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                batch_empty:
                  value:
                    error:
                      code: batch_empty
                      message: Batch must contain at least one item
                batch_too_large:
                  value:
                    error:
                      code: batch_too_large
                      message: Batch exceeds maximum of 50 items
        "429":
          description: Too many requests
          headers:
            Retry-After:
              description: Seconds to wait before retrying
              schema:
                type: string
              example: "60"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/urls/{code}:
    parameters:
      - name: code
        in: path
        required: true
        description: Short code or custom alias
        schema:
          type: string
        example: k7Xm2p

    get:
      summary: Get URL details
      operationId: getURL
      tags: [URLs]
      security:
        - ApiKeyAuth: []
      responses:
        "200":
          description: URL details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/URL"
              example:
                short_code: k7Xm2p
                short_url: "http://localhost:8080/k7Xm2p"
                original_url: "https://example.com"
                is_custom: false
                expires_at: null
                created_at: "2025-06-01T12:00:00Z"
                click_count: 42
        "404":
          description: Short code not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: not_found
                  message: Short URL not found
        "429":
          description: Too many requests
          headers:
            Retry-After:
              description: Seconds to wait before retrying
              schema:
                type: string
              example: "60"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: rate_limited
                  message: Too many requests. Please try again later.

    delete:
      summary: Delete short URL
      operationId: deleteURL
      tags: [URLs]
      security:
        - ApiKeyAuth: []
      responses:
        "204":
          description: Deleted successfully
        "404":
          description: Short code not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: not_found
                  message: Short URL not found
        "429":
          description: Too many requests
          headers:
            Retry-After:
              description: Seconds to wait before retrying
              schema:
                type: string
              example: "60"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: rate_limited
                  message: Too many requests. Please try again later.

  /{code}:
    get:
      summary: Redirect to original URL
      operationId: redirect
      tags: [Redirect]
      parameters:
        - name: code
          in: path
          required: true
          description: Short code or custom alias
          schema:
            type: string
          example: k7Xm2p
      responses:
        "302":
          description: Redirect to original URL
          headers:
            Location:
              description: The original URL
              schema:
                type: string
                format: uri
              example: "https://example.com/very/long/path"
        "404":
          description: Short code not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: not_found
                  message: Short URL not found
        "410":
          description: Short URL has expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: expired
                  message: This short URL has expired

  /health:
    get:
      summary: Health check
      operationId: healthCheck
      tags: [System]
      responses:
        "200":
          description: Server is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok]
              example:
                status: ok

components:
  schemas:
    BatchCreateURLRequest:
      type: object
      required: [urls]
      properties:
        urls:
          type: array
          description: List of URLs to shorten (1–50 items).
          minItems: 1
          maxItems: 50
          items:
            $ref: "#/components/schemas/CreateURLRequest"

    BatchItemResponse:
      type: object
      description: |
        Outcome of a single item in a batch request.
        On success, `short_code` / `short_url` / `original_url` are present.
        On failure, only `error` is present.
      properties:
        short_code:
          type: string
          example: k7Xm2p
        short_url:
          type: string
          format: uri
          example: "http://localhost:8080/k7Xm2p"
        original_url:
          type: string
          format: uri
          example: "https://example.com"
        expires_at:
          type: string
          format: date-time
          nullable: true
          example: "2025-07-01T00:00:00Z"
        created_at:
          type: string
          format: date-time
          example: "2025-06-01T12:00:00Z"
        error:
          $ref: "#/components/schemas/ErrorDetail"

    BatchSummary:
      type: object
      required: [total, success, failed]
      properties:
        total:
          type: integer
          example: 3
        success:
          type: integer
          example: 2
        failed:
          type: integer
          example: 1

    BatchCreateURLResponse:
      type: object
      required: [results, summary]
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/BatchItemResponse"
        summary:
          $ref: "#/components/schemas/BatchSummary"

    CreateURLRequest:
      type: object
      required: [url]
      properties:
        url:
          type: string
          format: uri
          description: The long URL to shorten (http/https only, max 2048 chars)
          example: "https://example.com/very/long/path?with=params"
        custom_alias:
          type: string
          description: |
            Optional custom alias (3–30 chars, `[a-zA-Z0-9-]`, no leading/trailing hyphens).
            If omitted, a short code is generated automatically.
          example: my-link
          minLength: 3
          maxLength: 30
        expires_in:
          type: string
          description: |
            Optional expiry duration. Accepted values: `1h`, `7d`, `30d`, `90d`, `365d`.
            Omit or use `"0"` for no expiry.
          example: 30d

    CreateURLResponse:
      type: object
      required: [short_code, short_url, original_url, created_at]
      properties:
        short_code:
          type: string
          description: The generated or custom short code
          example: k7Xm2p
        short_url:
          type: string
          format: uri
          description: Full short URL (base_url + short_code)
          example: "http://localhost:8080/k7Xm2p"
        original_url:
          type: string
          format: uri
          description: The original long URL
          example: "https://example.com/very/long/path?with=params"
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: Expiry timestamp in RFC3339 format, null if no expiry
          example: "2025-07-01T00:00:00Z"
        created_at:
          type: string
          format: date-time
          description: Creation timestamp in RFC3339 format
          example: "2025-06-01T12:00:00Z"

    URL:
      type: object
      required: [short_code, short_url, original_url, is_custom, created_at, click_count]
      properties:
        short_code:
          type: string
          example: k7Xm2p
        short_url:
          type: string
          format: uri
          example: "http://localhost:8080/k7Xm2p"
        original_url:
          type: string
          format: uri
          example: "https://example.com"
        is_custom:
          type: boolean
          description: True if the short code was user-specified
          example: false
        expires_at:
          type: string
          format: date-time
          nullable: true
          example: null
        created_at:
          type: string
          format: date-time
          example: "2025-06-01T12:00:00Z"
        click_count:
          type: integer
          format: int64
          description: Number of times this short URL was accessed
          example: 42

    ListURLsResponse:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/URL"
        pagination:
          $ref: "#/components/schemas/Pagination"

    Pagination:
      type: object
      required: [page, per_page, total, total_pages]
      properties:
        page:
          type: integer
          example: 1
        per_page:
          type: integer
          example: 20
        total:
          type: integer
          description: Total number of URLs
          example: 156
        total_pages:
          type: integer
          example: 8

    ErrorDetail:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: Machine-readable error code
          enum:
            - invalid_url
            - invalid_expires
            - invalid_body
            - invalid_alias
            - alias_taken
            - reserved_path
            - not_found
            - expired
            - unauthorized
            - rate_limited
            - batch_empty
            - batch_too_large
            - internal_error
          example: invalid_url
        message:
          type: string
          description: Human-readable error description
          example: The URL format is invalid

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          $ref: "#/components/schemas/ErrorDetail"

  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key authentication (added in Phase 3)
